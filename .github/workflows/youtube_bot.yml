name: YouTube Video Generator Bot

on:
  schedule:
    # Run at 6:00 AM IST (12:30 AM UTC) and 5:30 PM IST (12:00 PM UTC) daily
    - cron: '30 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install System Dependencies (FFmpeg & ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline and Upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
        run: |
          # The --upload flag tells main.py to upload to YouTube
          python main.py --upload

      - name: Commit and Push memory log (used_topics.txt)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add used_topics.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update used_topics.txt memory log [skip ci]" && git push)
